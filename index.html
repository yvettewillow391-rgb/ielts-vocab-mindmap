    function openTips() {
      if (!window.__TIPS__) { alert('技巧数据未加载'); return; }
      const tips = window.__TIPS__;

      let html = '<div style="display:grid;grid-template-columns:1fr;gap:1rem" class="tips-card-grid">';

      tipsCards.forEach(card => {
        const content = tips[card.key];
        if (!content || (Array.isArray(content) && content.length === 0)) return;

        html += '<div class="tips-grid-card rounded-2xl border overflow-hidden cursor-pointer hover:shadow-lg transition-all duration-200" style="border-color:' + card.color + '30" data-key="' + card.key + '" data-color="' + card.color + '">';
        html += '<div class="px-4 py-3 flex items-center gap-2.5 text-white text-sm font-semibold" style="background:' + card.color + '">';
        html += '<span class="text-lg">' + card.icon + '</span>' + card.title;
        html += '<span class="opacity-70 font-normal ml-auto text-xs">点击放大 →</span>';
        html += '</div>';
        html += '<div class="px-4 py-3 max-h-[260px] overflow-y-auto bg-white text-sm">';
        html += renderTipsCard(card.key, content, card.color);
        html += '</div></div>';
      });

      html += '</div>';
      tipsBody.innerHTML = html;
      tipsOverlay.classList.remove('hidden');

      // Card click → full view
      tipsBody.querySelectorAll('.tips-grid-card').forEach(card => {
        card.addEventListener('click', function() {
          const key = this.dataset.key;
          const color = this.dataset.color;
          const cardDef = tipsCards.find(c => c.key === key);
          showSingleTip(key, window.__TIPS__[key], color, cardDef);
        });
      });
    }

    function showSingleTip(key, content, color, cardDef) {
      let html = '';
      // Back button + header
      html += '<button id="tipsBackBtn" class="flex items-center gap-1.5 text-xs text-gray-400 hover:text-gray-600 mb-3 transition-colors">';
      html += '<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>返回全部技巧</button>';
      html += '<div class="rounded-2xl overflow-hidden mb-4">';
      html += '<div class="px-5 py-3.5 flex items-center gap-3 text-white" style="background:' + color + '">';
      html += '<span class="text-2xl">' + cardDef.icon + '</span>';
      html += '<div><h3 class="text-base font-bold">' + cardDef.title + '</h3><p class="text-xs opacity-70">' + cardDef.desc + '</p></div>';
      html += '</div>';
      html += '<div class="px-5 py-4 bg-white text-sm max-h-[58vh] overflow-y-auto">';
      html += renderTipsCard(key, content, color);
      html += '</div></div>';

      tipsBody.innerHTML = html;
      document.getElementById('tipsBackBtn').addEventListener('click', (e) => { e.stopPropagation(); openTips(); });
    }

    function renderTipsCard(key, content, color) {
      let html = '';

      const escEx = (ex) => typeof ex === 'string' ? ex : (ex.word ? ex.word + (ex.translation ? ' ' + ex.translation : '') : (ex.chinese_meaning || ''));

      switch (key) {
        case 'negative_prefixes':
          content.forEach(item => {
            html += '<div class="mb-2.5 last:mb-0"><span class="font-bold text-sm" style="color:' + color + '">' + escapeHTML(item.prefix) + '</span><span class="text-gray-400 ml-2 text-xs">' + escapeHTML(item.rule) + '</span>';
            html += '<div class="flex flex-wrap gap-1.5 mt-1">';
            item.examples.forEach(ex => html += '<span class="text-xs bg-red-50 text-red-800 rounded-md px-2 py-0.5">' + escapeHTML(escEx(ex)) + '</span>');
            html += '</div></div>';
          });
          break;

        case 'common_prefixes':
          const grouped = {};
          content.forEach(p => {
            const cat = p.category || '其他';
            if (!grouped[cat]) grouped[cat] = [];
            grouped[cat].push(p);
          });
          Object.entries(grouped).forEach(([cat, prefixes]) => {
            html += '<div class="mb-3 last:mb-0"><div class="font-semibold text-gray-500 mb-1.5 text-sm">' + escapeHTML(cat) + '</div>';
            prefixes.forEach(p => {
              html += '<div class="flex items-start gap-2 mb-1 text-xs"><span class="font-semibold text-indigo-600 min-w-[65px]">' + escapeHTML(p.prefix) + '</span><span class="text-gray-400 min-w-[45px]">' + escapeHTML(p.meaning) + '</span><span class="text-gray-600">' + (p.examples || []).map(escEx).join(' · ') + '</span></div>';
            });
            html += '</div>';
          });
          break;

        case 'noun_suffixes':
        case 'adjective_suffixes':
        case 'verb_suffixes':
          html += '<div class="space-y-2.5">';
          content.forEach(item => {
            html += '<div><span class="font-bold text-sm" style="color:' + color + '">' + escapeHTML(item.suffix) + '</span><span class="text-gray-400 ml-2 text-xs">' + escapeHTML(item.meaning) + '</span>';
            html += '<div class="flex flex-wrap gap-1.5 mt-0.5">';
            item.examples.forEach(ex => html += '<span class="text-xs bg-gray-100 text-gray-700 rounded-md px-2 py-0.5">' + escapeHTML(escEx(ex)) + '</span>');
            html += '</div></div>';
          });
          html += '</div>';
          break;

        case 'common_roots':
          content.forEach(category => {
            html += '<div class="mb-3 last:mb-0"><div class="font-semibold text-gray-500 mb-1.5 text-sm">' + escapeHTML(category.category) + '</div>';
            category.roots.forEach(r => {
              html += '<div class="flex items-start gap-2 mb-1 text-xs"><span class="font-semibold" style="color:' + color + '">' + escapeHTML(r.root) + '</span><span class="text-gray-400 min-w-[45px]">' + escapeHTML(r.meaning) + '</span><span class="text-gray-600">' + (r.examples || []).join(' · ') + '</span></div>';
            });
            html += '</div>';
          });
          break;

        case 'confused_roots':
          content.forEach(group => {
            html += '<div class="mb-3 last:mb-0 p-3 bg-amber-50/60 rounded-xl"><div class="font-bold text-amber-700 mb-2 text-sm">' + escapeHTML(group.group) + '</div>';
            html += '<div class="grid grid-cols-2 gap-2 text-xs">';
            group.words.forEach(w => {
              html += '<div class="bg-white rounded-lg p-2.5"><span class="font-semibold text-gray-800">' + escapeHTML(w.word) + '</span><span class="text-gray-400 ml-1">' + escapeHTML(w.meaning) + '</span>';
              html += '<div class="text-gray-400 mt-0.5">' + escapeHTML(w.note || '') + '</div></div>';
            });
            html += '</div></div>';
          });
          break;

        case 'synonym_groups':
          content.forEach(group => {
            html += '<div class="mb-2.5 last:mb-0"><span class="font-semibold text-sm" style="color:' + color + '">' + escapeHTML(group.topic || group.category || '') + '</span>';
            html += '<div class="flex flex-wrap gap-1.5 mt-1">';
            (group.synonyms || group.words || []).forEach(s => {
              html += '<span class="text-xs bg-green-50 text-green-800 rounded-md px-2 py-0.5"><span class="font-medium">' + escapeHTML(s.word || s) + '</span><span class="text-green-600 ml-1">' + escapeHTML(s.meaning || '') + '</span></span>';
            });
            html += '</div></div>';
          });
          break;

        case 'academic_words':
          content.forEach(category => {
            html += '<div class="mb-3 last:mb-0"><div class="font-semibold text-gray-500 mb-1.5 text-sm">' + escapeHTML(category.usage || category.category || '') + '</div>';
            html += '<div class="flex flex-wrap gap-1.5">';
            (category.words || []).forEach(w => {
              html += '<span class="text-xs bg-gray-100 rounded-md px-2 py-0.5"><span class="font-medium text-gray-800">' + escapeHTML(w.word) + '</span><span class="text-gray-400 ml-1">' + escapeHTML(w.chinese_meaning || w.meaning || '') + '</span>' + (w.collocation ? '<span class="text-sky-500 ml-1">' + escapeHTML(w.collocation) + '</span>' : '') + '</span>';
            });
            html += '</div></div>';
          });
          break;

        case 'polysemous':
          html += '<div class="space-y-2.5">';
          content.forEach(w => {
            html += '<div class="bg-purple-50/40 rounded-xl p-3"><span class="font-bold text-purple-700 text-sm">' + escapeHTML(w.word) + '</span>';
            html += '<div class="mt-1.5 space-y-1">';
            (w.meanings || []).forEach(m => {
              html += '<div class="flex items-start gap-1.5 text-xs"><span class="text-gray-700 font-medium">' + escapeHTML(m.chinese_meaning || m.meaning || '') + '</span>';
              if (m.example) html += '<span class="text-gray-400">— ' + escapeHTML(m.example) + '</span>';
              html += '</div>';
            });
            html += '</div></div>';
          });
          break;

        case 'misspelled':
          content.forEach(group => {
            html += '<div class="mb-2.5 last:mb-0"><span class="font-semibold text-sm" style="color:' + color + '">' + escapeHTML(group.pattern || group.category || '') + '</span>';
            html += '<div class="flex flex-wrap gap-1.5 mt-1">';
            (group.words || []).forEach(w => {
              html += '<span class="text-xs bg-gray-100 rounded-md px-2 py-0.5"><span class="font-semibold text-gray-800">' + escapeHTML(w.correct || w.word || '') + '</span>' + (w.common_mistake || w.mistake ? '<span class="text-red-400 line-through ml-1">' + escapeHTML(w.common_mistake || w.mistake || '') + '</span>' : '') + '<span class="text-gray-400 ml-1">' + escapeHTML(w.chinese_meaning || w.meaning || '') + '</span></span>';
            });
            html += '</div></div>';
          });
          break;

        default:
          html += '<span class="text-gray-400 text-sm">内容加载中...</span>';
      }

      return html;
    }

    function closeTips() {
      tipsOverlay.classList.add('hidden');
    }

    function toggleTipsFullscreen() {
      tipsFullscreen = !tipsFullscreen;
      if (tipsFullscreen) {
        tipsPanel.style.width = '96vw';
        tipsPanel.style.maxHeight = '96vh';
        tipsPanel.style.borderRadius = '1rem';
        $('fullscreenTipsBtn').innerHTML = '<svg class="w-4.5 h-4.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 9V4.5M9 9H4.5M9 9L3.75 3.75M9 15v4.5M9 15H4.5M9 15l-5.25 5.25M15 9h4.5M15 9V4.5M15 9l5.25-5.25M15 15h4.5M15 15v4.5M15 15l5.25 5.25"/></svg>';
        $('fullscreenTipsBtn').title = '退出全屏';
        tipsBody.style.maxHeight = '82vh';
      } else {
        tipsPanel.style.width = '';
        tipsPanel.style.maxHeight = '88vh';
        tipsPanel.style.borderRadius = '1rem';
        $('fullscreenTipsBtn').innerHTML = '<svg class="w-4.5 h-4.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4m0 4h-4"/></svg>';
        $('fullscreenTipsBtn').title = '全屏';
        tipsBody.style.maxHeight = '';
      }
    }

    /* ================================================================
       INIT
       ================================================================ */
    async function init() {
      await loadData();
      loadFavorites();

      // Merge localStorage edits into fresh data.json (preserve enriched fields)
      try {
        const saved = localStorage.getItem('ielts_data');
        if (saved) {
          const parsed = JSON.parse(saved);
          if (Array.isArray(parsed) && parsed.length > 0) {
            originalDataJson = JSON.stringify(allData); // backup original
            // Smart merge: prefer data.json for enriched fields, localStorage for user edits
            parsed.forEach(savedRoot => {
              const existingRoot = allData.find(r => r.root === savedRoot.root);
              if (!existingRoot) {
                allData.push(savedRoot); // user-added root
              } else if (savedRoot.words) {
                savedRoot.words.forEach(savedWord => {
                  const existingWord = existingRoot.words.find(w => w.word === savedWord.word);
                  if (!existingWord) {
                    existingRoot.words.push(savedWord); // user-added word
                  } else {
                    // Preserve enriched fields from data.json if localStorage lacks them
                    if (!savedWord.etymology && existingWord.etymology) savedWord.etymology = existingWord.etymology;
                    if (!savedWord.mnemonic && existingWord.mnemonic) savedWord.mnemonic = existingWord.mnemonic;
                    if (!savedWord.extra_phrases && existingWord.extra_phrases) savedWord.extra_phrases = existingWord.extra_phrases;
                    if (savedWord.inflections && existingWord.inflections && savedWord.inflections.length < existingWord.inflections.length) {
                      // Keep enriched inflections if localStorage has fewer
                      savedWord.inflections = existingWord.inflections;
                    }
                    if (savedWord.synonyms && existingWord.synonyms && savedWord.synonyms.length < existingWord.synonyms.length) {
                      savedWord.synonyms = existingWord.synonyms;
                    }
                    if (savedWord.antonyms && existingWord.antonyms && savedWord.antonyms.length < existingWord.antonyms.length) {
                      savedWord.antonyms = existingWord.antonyms;
                    }
                    if (savedWord.ielts_sentences && existingWord.ielts_sentences && savedWord.ielts_sentences.length < existingWord.ielts_sentences.length) {
                      savedWord.ielts_sentences = existingWord.ielts_sentences;
                    }
                    if (savedWord.ielts_phrases && existingWord.ielts_phrases && savedWord.ielts_phrases.length < existingWord.ielts_phrases.length) {
                      savedWord.ielts_phrases = existingWord.ielts_phrases;
                    }
                    existingRoot.words[existingRoot.words.indexOf(existingWord)] = savedWord;
                  }
                });
              }
            });
          }
        }
      } catch (e) { /* ignore */ }

      if (allData.length === 0) {
        rootListInner.innerHTML =
          '<div class="flex flex-col items-center justify-center h-full text-gray-400 mt-12">' +
          '<p class="text-sm">未能加载 data.json</p>' +
          '<p class="text-xs mt-1">请确保 data.json 与 index.html 在同一目录，并通过本地服务器打开此页面</p>' +
          '</div>';
        welcomeScreen.innerHTML =
          '<div class="text-center select-none">' +
          '<p class="text-lg text-gray-400 font-medium">请使用 Live Server 或其他本地服务器打开</p>' +
          '<p class="text-sm text-gray-300 mt-1">直接双击打开可能无法加载 data.json</p>' +
          '</div>';
        return;
      }

      renderRootList('');

      // Initialize welcome screen with ECharts (hidden)
      initChart();
      if (chart) {
        chart.setOption({
          series: [{
            type: 'tree',
            data: [{
              name: '选择一个词根',
              itemStyle: { color: '#cbd5e1' },
              symbolSize: 12,
              label: { fontSize: 16, color: '#94a3b8', fontWeight: 'bold' },
            }],
            orient: 'LR',
            roam: false,
            top: '30%',
            left: '30%',
          }]
        });
      }
    }

    init().catch(err => {
      console.error('Init failed:', err);
    });

  })();
  </script>
