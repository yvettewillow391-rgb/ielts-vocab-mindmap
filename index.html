<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IELTS 词根记忆脑图</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
  <script src="tips-data.js"></script>
  <style>
    #rootList::-webkit-scrollbar { width: 5px; }
    #rootList::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 4px; }
    #detailInner::-webkit-scrollbar { width: 5px; }
    #detailInner::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 4px; }
    html, body { scroll-behavior: smooth; }
    #rootList { scroll-behavior: smooth; }
    #detailInner { scroll-behavior: smooth; }
    /* Collapsible sidebar */
    #sidebar { transition: width 0.3s ease; }
    #sidebar.collapsed { width: 48px !important; flex-shrink: 0; }
    #sidebar .sidebar-content { transition: opacity 0.2s ease; }
    #sidebar.collapsed .sidebar-content { opacity: 0; pointer-events: none; }
    #collapseBtn { transition: transform 0.3s ease; }
    #sidebar.collapsed #collapseBtn { transform: rotate(180deg); }
    /* Icon bar (shown when collapsed) */
    #iconBar { display: none; }
    #sidebar.collapsed #iconBar { display: flex !important; flex-direction: column; align-items: center; gap: 10px; padding-top: 8px; }
    #sidebar.collapsed #sidebarInner { display: none; }
    /* Tips responsive grid */
    @media (min-width: 600px) {
      .tips-card-grid { grid-template-columns: repeat(2, 1fr) !important; }
    }
    /* ===== MOBILE RESPONSIVE ===== */
    @media (max-width: 767px) {
      /* Auto-collapse sidebar on mobile */
      #sidebar:not(.expanded-mobile) { width: 48px !important; flex-shrink: 0; }
      #sidebar:not(.expanded-mobile) #iconBar { display: flex !important; flex-direction: column; align-items: center; gap: 10px; padding-top: 8px; }
      #sidebar:not(.expanded-mobile) #sidebarInner { display: none; }
      #sidebar.expanded-mobile { width: 100vw !important; position: fixed; left: 0; top: 0; bottom: 0; z-index: 50; }
      #sidebar.expanded-mobile #iconBar { display: none; }
      #sidebar.expanded-mobile #sidebarInner { display: block; }
      #sidebar.expanded-mobile #collapseBtn { display: none; }
      /* Mobile overlay when sidebar expanded */
      #sidebarMobileOverlay { display: none; }
      #sidebar.expanded-mobile + #sidebarMobileOverlay { display: block; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 49; }
      /* Detail panel full-width on mobile */
      #detailPanel { position: fixed; right: 0; top: 0; bottom: 0; z-index: 40; }
      #detailInner { width: 100vw !important; }
    }
    .speaker-btn {
      transition: transform 0.15s ease, color 0.15s ease;
    }
    .speaker-btn:hover {
      transform: scale(1.15);
      color: #4f46e5;
    }
    .speaker-btn:active {
      transform: scale(0.95);
    }
    .root-item {
      transition: all 0.2s ease;
    }
    .root-item:hover {
      background-color: #eef2ff;
      border-left-color: #6366f1;
    }
    .root-item.active {
      background-color: #e0e7ff;
      border-left-color: #4f46e5;
      font-weight: 600;
    }
    @keyframes pulse-dot {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
    .speaking-indicator {
      animation: pulse-dot 0.6s ease-in-out infinite;
    }
    /* Edit mode styles */
    .edit-input {
      border: 1px solid #d1d5db;
      border-radius: 6px;
      padding: 4px 8px;
      font-size: 13px;
      width: 100%;
      outline: none;
      transition: border-color 0.15s;
    }
    .edit-input:focus {
      border-color: #6366f1;
      box-shadow: 0 0 0 2px rgba(99,102,241,0.1);
    }
    .edit-textarea {
      border: 1px solid #d1d5db;
      border-radius: 6px;
      padding: 6px 8px;
      font-size: 12px;
      width: 100%;
      outline: none;
      resize: vertical;
      min-height: 40px;
    }
    .edit-textarea:focus {
      border-color: #6366f1;
      box-shadow: 0 0 0 2px rgba(99,102,241,0.1);
    }
    .edit-row {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 6px;
    }
    .edit-row .edit-input {
      flex: 1;
    }
    .btn-icon {
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      font-size: 16px;
      transition: all 0.15s;
      flex-shrink: 0;
    }
    .btn-add { background: #e0e7ff; color: #4f46e5; }
    .btn-add:hover { background: #c7d2fe; }
    .btn-del { background: #fee2e2; color: #ef4444; }
    .btn-del:hover { background: #fecaca; }
    .btn-save { background: #4f46e5; color: white; padding: 6px 16px; border-radius: 8px; border: none; cursor: pointer; font-size: 13px; font-weight: 500; transition: background 0.15s; }
    .btn-save:hover { background: #4338ca; }
    .btn-cancel { background: #f3f4f6; color: #374151; padding: 6px 16px; border-radius: 8px; border: none; cursor: pointer; font-size: 13px; font-weight: 500; transition: background 0.15s; }
    .btn-cancel:hover { background: #e5e7eb; }
    .edit-section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }
  </style>
</head>
<body class="h-screen overflow-hidden bg-gray-100 flex">

  <!-- Password Gate -->
  <div id="pwGate" style="position:fixed;inset:0;z-index:99999;background:linear-gradient(135deg,#1a1a2e,#16213e,#0f3460);display:none;align-items:center;justify-content:center;font-family:system-ui,-apple-system,sans-serif">
    <div style="background:#fff;border-radius:1.25rem;padding:2.5rem 2rem;text-align:center;max-width:380px;width:90%;box-shadow:0 25px 50px rgba(0,0,0,0.3)">
      <div style="font-size:3rem;margin-bottom:0.5rem">🧠</div>
      <h2 style="font-size:1.4rem;font-weight:700;color:#1a1a2e;margin-bottom:0.25rem">IELTS 词根脑图</h2>
      <p style="font-size:0.8rem;color:#94a3b8;margin-bottom:1.5rem">输入密码以访问</p>
      <input id="pwInput" type="password" placeholder="请输入密码" style="width:100%;padding:0.8rem 1rem;border:2px solid #e2e8f0;border-radius:0.75rem;font-size:1rem;text-align:center;outline:none;box-sizing:border-box" autofocus>
      <p id="pwError" style="color:#ef4444;font-size:0.75rem;margin-top:0.5rem;display:none">密码错误，请重试</p>
      <button id="pwSubmit" style="width:100%;margin-top:1rem;padding:0.8rem;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border:none;border-radius:0.75rem;font-size:0.95rem;font-weight:600;cursor:pointer;transition:opacity 0.2s">进入应用</button>
      <p style="font-size:0.7rem;color:#cbd5e1;margin-top:1.25rem">请输入密码以继续</p>
    </div>
  </div>

  <!-- ===== LEFT SIDEBAR ===== -->
  <aside id="sidebar" class="w-80 flex-shrink-0 bg-white shadow-lg z-20 flex flex-col" style="overflow:hidden">
    <!-- Icon bar (shown only when collapsed) -->
    <div id="iconBar">
      <button id="expandFromIcon" title="展开侧栏" style="width:32px;height:32px;display:flex;align-items:center;justify-content:center;border:none;background:#f3f4f6;border-radius:8px;cursor:pointer;color:#6b7280;font-size:14px">▶</button>
      <button id="iconSearch" title="搜索" style="width:32px;height:32px;display:flex;align-items:center;justify-content:center;border:none;background:transparent;border-radius:8px;cursor:pointer;color:#9ca3af;font-size:14px">🔍</button>
      <button id="iconDict" title="默写" style="width:32px;height:32px;display:flex;align-items:center;justify-content:center;border:none;background:transparent;border-radius:8px;cursor:pointer;color:#9ca3af;font-size:14px">✏️</button>
      <button id="iconTips" title="技巧" style="width:32px;height:32px;display:flex;align-items:center;justify-content:center;border:none;background:transparent;border-radius:8px;cursor:pointer;color:#9ca3af;font-size:14px">💡</button>
      <button id="iconFav" title="收藏" style="width:32px;height:32px;display:flex;align-items:center;justify-content:center;border:none;background:transparent;border-radius:8px;cursor:pointer;color:#9ca3af;font-size:14px">⭐</button>
    </div>

    <!-- Main sidebar content -->
    <div id="sidebarInner">
    <div class="px-5 py-4 border-b border-gray-200 flex items-center justify-between">
      <div>
        <h1 class="text-lg font-bold text-indigo-700 tracking-tight">IELTS 词根记忆脑图</h1>
        <p class="text-xs text-gray-400 mt-0.5">Root Word Mind Map</p>
      </div>
      <button id="collapseBtn" title="收起侧栏" style="width:28px;height:28px;display:flex;align-items:center;justify-content:center;border:none;background:#f3f4f6;border-radius:6px;cursor:pointer;color:#9ca3af;font-size:12px;flex-shrink:0">◀</button>
    </div>

    <!-- Search -->
    <div class="px-4 py-3 relative">
      <div class="relative">
        <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
        </svg>
        <input id="searchInput" type="text" placeholder="搜索词根 / 单词 / 中文..."
          class="w-full pl-9 pr-3 py-2 text-sm border border-gray-200 rounded-lg focus:outline-none focus:border-indigo-400 focus:ring-1 focus:ring-indigo-100 transition-colors">
      </div>
      <!-- Search results dropdown -->
      <div id="searchResults"
        class="absolute left-4 right-4 top-full mt-1 bg-white border border-gray-200 rounded-lg shadow-xl z-30 hidden max-h-72 overflow-y-auto">
      </div>
    </div>

    <!-- Dictionary lookup -->
    <div class="px-4 pb-1">
      <div class="flex gap-1.5">
        <input id="dictLookupInput" type="text" placeholder="查词典，输入单词..."
          class="flex-1 pl-2.5 pr-2 py-1.5 text-xs border border-gray-200 rounded-lg focus:outline-none focus:border-blue-400 focus:ring-1 focus:ring-blue-100 transition-colors">
        <button id="dictLookupBtn" class="px-2.5 py-1.5 text-xs font-medium rounded-lg bg-blue-50 text-blue-600 hover:bg-blue-100 transition-colors flex-shrink-0">查词</button>
      </div>
      <div id="dictLookupResult" class="hidden mt-2 bg-blue-50 rounded-lg p-2.5 text-xs max-h-48 overflow-y-auto"></div>
    </div>

    <!-- Accent toggle -->
    <div class="px-4 pb-2 flex items-center gap-2">
      <span class="text-xs text-gray-400">发音:</span>
      <button data-accent="en-US" class="accent-btn active-accent px-2 py-0.5 text-xs rounded-full bg-indigo-100 text-indigo-700 font-medium transition-colors">🇺🇸 美音</button>
      <button data-accent="en-GB" class="accent-btn px-2 py-0.5 text-xs rounded-full bg-gray-100 text-gray-500 font-medium transition-colors">🇬🇧 英音</button>
    </div>

    <!-- Dictation & Share buttons -->
    <div class="px-4 pb-2 flex gap-2">
      <button id="openDictBtn" class="flex-1 py-2 text-xs font-medium rounded-lg bg-indigo-500 text-white hover:bg-indigo-600 transition-colors flex items-center justify-center gap-1">
        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z"/>
        </svg>
        默写
      </button>
      <button id="tipsBtn" class="flex-1 py-2 text-xs font-medium rounded-lg bg-amber-100 text-amber-700 hover:bg-amber-200 transition-colors flex items-center justify-center gap-1" title="词根技巧">
        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/>
        </svg>
        技巧
      </button>
    </div>

    <!-- Favorites filter -->
    <div class="px-4 pb-3">
      <button id="favFilterBtn" class="w-full py-1.5 text-xs font-medium rounded-lg bg-amber-50 text-amber-600 hover:bg-amber-100 transition-colors flex items-center justify-center gap-1">
        <span id="favFilterIcon">⭐</span>
        <span>我的收藏 (<span id="favCount">0</span>)</span>
      </button>
    </div>

    <!-- Root list -->
    <nav id="rootList" class="flex-1 overflow-y-auto px-2 pb-1">
      <div id="rootListInner"></div>
      <div id="rootListEmpty" class="hidden flex flex-col items-center justify-center h-full text-gray-400">
        <svg class="w-10 h-10 mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
        </svg>
        <p class="text-xs">未找到匹配的词根</p>
      </div>
    </nav>
    <div class="px-2 pb-3">
      <button id="addRootBtn" class="w-full py-1.5 text-xs font-medium rounded-lg border border-dashed border-gray-300 text-gray-400 hover:border-indigo-400 hover:text-indigo-500 transition-colors">+ 新增词根</button>
    </div>
    </div><!-- #sidebarInner -->
  </aside>
  <div id="sidebarMobileOverlay"></div>

  <!-- ===== MAIN CONTENT ===== -->
  <main class="flex-1 relative flex flex-col min-w-0">

    <!-- Welcome screen -->
    <div id="welcomeScreen" class="flex-1 flex items-center justify-center bg-gray-50">
      <div class="text-center select-none">
        <div class="w-20 h-20 mx-auto mb-5 rounded-2xl bg-indigo-50 flex items-center justify-center">
          <svg class="w-10 h-10 text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
              d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/>
          </svg>
        </div>
        <p class="text-lg text-gray-500 font-medium">从左侧选择一个词根开始学习</p>
        <p class="text-sm text-gray-300 mt-1">点击词根即可渲染脑图</p>
      </div>
    </div>

    <!-- ECharts container -->
    <div id="chartContainer" class="flex-1 hidden relative" style="min-height: 0;">
      <div id="chartHint" class="absolute bottom-3 left-1/2 -translate-x-1/2 text-[10px] text-gray-300 bg-white/80 px-3 py-1 rounded-full pointer-events-none z-10">滚轮缩放 · 拖拽平移</div>
      <!-- Pan controls -->
      <div id="chartPanCtrls" class="absolute bottom-3 right-3 z-10 grid grid-cols-3 gap-0.5">
        <div></div>
        <button id="panUp" class="w-7 h-7 rounded bg-white/90 shadow border border-gray-200 flex items-center justify-center text-gray-400 hover:text-indigo-500 transition-colors" title="上移">▲</button>
        <div></div>
        <button id="panLeft" class="w-7 h-7 rounded bg-white/90 shadow border border-gray-200 flex items-center justify-center text-gray-400 hover:text-indigo-500 transition-colors" title="左移">◀</button>
        <button id="panReset" class="w-7 h-7 rounded bg-white/90 shadow border border-gray-200 flex items-center justify-center text-[10px] text-gray-400 hover:text-indigo-500 transition-colors" title="重置">↺</button>
        <button id="panRight" class="w-7 h-7 rounded bg-white/90 shadow border border-gray-200 flex items-center justify-center text-gray-400 hover:text-indigo-500 transition-colors" title="右移">▶</button>
        <div></div>
        <button id="panDown" class="w-7 h-7 rounded bg-white/90 shadow border border-gray-200 flex items-center justify-center text-gray-400 hover:text-indigo-500 transition-colors" title="下移">▼</button>
        <div></div>
      </div>
    </div>
  </main>

  <!-- ===== DETAIL PANEL ===== -->
  <aside id="detailPanel"
    class="flex-shrink-0 bg-white shadow-lg z-10 overflow-hidden transition-all duration-300 ease-in-out"
    style="width: 0;">
    <div id="detailInner" class="overflow-y-auto" style="width: 360px; height: 100vh; padding: 0;">
      <div class="sticky top-0 bg-white z-10 px-5 py-3 border-b border-gray-100 flex items-center justify-between">
        <div>
          <h3 id="detailWord" class="text-lg font-bold text-gray-800"></h3>
          <p id="detailMeaning" class="text-sm text-gray-400"></p>
        </div>
        <div class="flex items-center gap-2">
          <!-- Edit toggle -->
          <button id="pasteImportBtn" title="粘贴导入"
            class="w-7 h-7 flex items-center justify-center rounded-full hover:bg-amber-50 text-gray-400 hover:text-amber-500 transition-colors hidden">
            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
            </svg>
          </button>
          <button id="addWordBtn" title="新增单词"
            class="w-7 h-7 flex items-center justify-center rounded-full hover:bg-green-50 text-gray-400 hover:text-green-500 transition-colors hidden">
            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
            </svg>
          </button>
          <button id="dictBtn" title="查词典"
            class="w-7 h-7 flex items-center justify-center rounded-full hover:bg-blue-50 text-gray-400 hover:text-blue-500 transition-colors">
            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/>
            </svg>
          </button>
          <button id="editToggleBtn" title="编辑"
            class="w-7 h-7 flex items-center justify-center rounded-full hover:bg-indigo-50 text-gray-400 hover:text-indigo-500 transition-colors">
            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
            </svg>
          </button>
          <!-- Export button (shown in edit mode) -->
          <button id="exportBtn" title="导出JSON" style="display:none"
            class="w-7 h-7 flex items-center justify-center rounded-full hover:bg-green-50 text-gray-400 hover:text-green-500 transition-colors">
            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/>
            </svg>
          </button>
          <!-- Auto-read toggle -->
          <label class="flex items-center gap-1.5 cursor-pointer select-none" title="自动连读">
            <span class="text-[10px] text-gray-400">连读</span>
            <div class="relative">
              <input type="checkbox" id="autoReadToggle" class="sr-only peer">
              <div class="w-8 h-4 bg-gray-200 rounded-full peer-checked:bg-indigo-400 transition-colors"></div>
              <div class="absolute top-0.5 left-0.5 w-3 h-3 bg-white rounded-full peer-checked:translate-x-4 transition-transform"></div>
            </div>
          </label>
          <button id="stopSpeakBtn" title="停止朗读"
            class="w-7 h-7 flex items-center justify-center rounded-full bg-red-50 text-red-400 hover:bg-red-100 transition-colors hidden">
            <svg class="w-3.5 h-3.5" fill="currentColor" viewBox="0 0 24 24"><rect x="6" y="6" width="12" height="12" rx="1"/></svg>
          </button>
          <button id="favoriteBtn" title="收藏单词"
            class="w-7 h-7 flex items-center justify-center rounded-full hover:bg-amber-50 text-gray-400 hover:text-amber-400 transition-colors">
            <svg class="w-4 h-4" id="favStarIcon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.915c.969 0 1.371 1.24.588 1.81l-3.976 2.888a1 1 0 00-.363 1.118l1.518 4.674c.3.922-.755 1.688-1.538 1.118l-3.976-2.888a1 1 0 00-1.176 0l-3.976 2.888c-.783.57-1.838-.197-1.538-1.118l1.518-4.674a1 1 0 00-.363-1.118l-3.976-2.888c-.784-.57-.38-1.81.588-1.81h4.914a1 1 0 00.951-.69l1.519-4.674z"/>
            </svg>
          </button>

  <script>
  (function() {
    /* ================================================================

    var editAuthenticated = false;

    /* ================================================================

    /* ================================================================

    /* ================================================================
       DATA LOADING
       ================================================================ */
    async function loadData() {
      try {
        const res = await fetch('data.json');
        if (!res.ok) throw new Error('HTTP ' + res.status);
        allData = await res.json();
      } catch (err) {
        console.warn('Fetch failed, trying inline fallback:', err.message);
        allData = [];
      }
      if (!Array.isArray(allData) || allData.length === 0) {
        allData = [];
      }
    }

    /* ================================================================
       SPEECH SYSTEM
       ================================================================ */
    function getSpeakableText(text) {
      if (!text) return '';
      return text
        .replace(/（[^）]*）/g, '')
        .replace(/\([^)]*[一-鿿][^)]*\)/g, '')
        .replace(/[一-鿿]/g, '')
        .replace(/\s+/g, ' ')
        .replace(/[，。！？、：；""'']/g, '')
        .trim();
    }

    function stopAllSpeech() {
      window.speechSynthesis.cancel();
      speechQueue = [];
      isSpeaking = false;
      stopSpeakBtn.classList.add('hidden');
    }

    function processSpeechQueue() {
      if (isSpeaking || speechQueue.length === 0) {
        if (speechQueue.length === 0) {
          isSpeaking = false;
          stopSpeakBtn.classList.add('hidden');
        }
        return;
      }
      isSpeaking = true;
      stopSpeakBtn.classList.remove('hidden');
      const item = speechQueue.shift();
      const text = getSpeakableText(item.text);
      if (!text) {
        isSpeaking = false;
        processSpeechQueue();
        return;
      }
      const u = new SpeechSynthesisUtterance(text);
      u.lang = accent;
      u.rate = 0.82;
      u.pitch = 1.0;
      // Select best available voice
      const voices = window.speechSynthesis.getVoices();
      if (voices.length > 0) {
        // Prefer natural/online voices over default
        const preferred = voices.find(v => v.lang.startsWith('en-US') && (v.name.includes('Natural') || v.name.includes('Online'))) ||
                          voices.find(v => v.lang.startsWith('en-US') && v.name.includes('Microsoft')) ||
                          voices.find(v => v.lang.startsWith('en-US'));
        if (preferred) u.voice = preferred;
      }
      u.onend = () => {
        isSpeaking = false;
        if (item.callback) item.callback();
        processSpeechQueue();
      };
      u.onerror = () => {
        isSpeaking = false;
        processSpeechQueue();
      };
      window.speechSynthesis.speak(u);
    }

    function speak(text, callback) {
      stopAllSpeech();
      speechQueue.push({ text, callback: callback || null });
      processSpeechQueue();
    }

    function speakSequence(items) {
      stopAllSpeech();
      items.forEach(t => speechQueue.push({ text: t, callback: null }));
      processSpeechQueue();
    }

    /* ================================================================
       SPEAKER ICON (inline SVG)
       ================================================================ */
    function speakerSVG(cls) {
      return `<svg class="${cls || 'w-4 h-4'}" viewBox="0 0 24 24" fill="currentColor">
        <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>
      </svg>`;
    }

    function makeSpeakerBtn(text, label) {
      const btn = document.createElement('button');
      btn.className = 'speaker-btn inline-flex items-center justify-center w-6 h-6 rounded-full bg-gray-50 text-gray-400 hover:bg-indigo-50 hover:text-indigo-500 flex-shrink-0';
      btn.innerHTML = speakerSVG('w-3.5 h-3.5');
      btn.title = '朗读' + (label ? ' ' + label : '');
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        speak(text);
      });
      return btn;
    }

    /* ================================================================
       BUILD TREE DATA for ECharts
       ================================================================ */
    function buildTreeData(rootData, highlightWordIdx) {
      const rootNode = {
        name: rootData.root,
        _type: 'root',
        _data: rootData,
        itemStyle: { color: '#4f46e5', borderColor: '#4338ca', borderWidth: 2 },
        symbolSize: 16,
        label: {
          position: 'right',
          formatter: [
            '{name|' + rootData.root + '}',
            '{meaning|' + (rootData.root_meaning || '') + '}'
          ].join('\n'),
          rich: {
            name: { fontSize: 15, fontWeight: 'bold', color: '#1e293b', lineHeight: 20 },
            meaning: { fontSize: 11, color: '#6366f1', lineHeight: 16 },
          }
        },
        collapsed: false,
        children: []
      };

      rootData.words.forEach((word, wi) => {
        const isHighlighted = (wi === highlightWordIdx);
        const wordNode = {
          name: word.word,
          _type: 'word',
          _wordIndex: wi,
          _data: word,
          itemStyle: {
            color: isHighlighted ? '#f59e0b' : '#0891b2',
            borderColor: isHighlighted ? '#d97706' : '#0e7490',
            borderWidth: isHighlighted ? 3 : 1,
            shadowBlur: isHighlighted ? 10 : 0,
            shadowColor: 'rgba(245,158,11,0.5)',
          },
          symbolSize: isHighlighted ? 14 : 11,
          label: {
            position: 'right',
            formatter: [
              '{name|' + word.word + '}',
              '{meaning|' + (word.meaning || '') + '}'
            ].join('\n'),
            rich: {
              name: { fontSize: 13, fontWeight: 'bold', color: isHighlighted ? '#d97706' : '#0e7490', lineHeight: 18 },
              meaning: { fontSize: 10, color: '#6b7280', lineHeight: 14 },
            }
          },
          collapsed: false,
          children: []
        };

        // Inflections
        (word.inflections || []).forEach(inf => {
          const infText = typeof inf === 'object' ? inf.word : inf;
          const infMeaning = (typeof inf === 'object' && inf.meaning) ? ' · ' + inf.meaning : '';
          wordNode.children.push({
            name: infText + infMeaning,
            _type: 'inflection',
            _wordIndex: wi,
            _data: word,
            _text: infText,
            itemStyle: { color: '#10b981', borderColor: '#059669', borderWidth: 0 },
            symbolSize: 7,
            label: {
              position: 'right',
              fontSize: 10,
              color: '#047857',
              formatter: infText + infMeaning,
            },
          });
        });

        // Synonyms
        (word.synonyms || []).forEach(syn => {
          const synText = (typeof syn === 'object' ? syn.word : syn) + (syn.meaning ? ' · ' + syn.meaning : '');
          wordNode.children.push({
            name: '≈ ' + synText,
            _type: 'synonym',
            _wordIndex: wi,
            _data: word,
            _text: typeof syn === 'object' ? syn.word : syn,
            itemStyle: { color: '#8b5cf6', borderColor: '#7c3aed', borderWidth: 0 },
            symbolSize: 6,
            label: {
              position: 'right',
              fontSize: 10,
              color: '#6d28d9',
              formatter: '≈ ' + synText,
            },
          });
        });

        // Antonyms
        (word.antonyms || []).forEach(ant => {
          const antText = (typeof ant === 'object' ? ant.word : ant) + (ant.meaning ? ' · ' + ant.meaning : '');
          wordNode.children.push({
            name: '≠ ' + antText,
            _type: 'antonym',
            _wordIndex: wi,
            _data: word,
            _text: typeof ant === 'object' ? ant.word : ant,
            itemStyle: { color: '#ef4444', borderColor: '#dc2626', borderWidth: 0 },
            symbolSize: 6,
            label: {
              position: 'right',
              fontSize: 10,
              color: '#b91c1c',
              formatter: '≠ ' + antText,
            },
          });
        });

        // Phrases
        (word.ielts_phrases || []).forEach(ph => {
          const phText = typeof ph === 'object' ? ph.en : ph;
          const phZh = (typeof ph === 'object' && ph.zh) ? '  ' + ph.zh : '';
          wordNode.children.push({
            name: phText + phZh,
            _type: 'phrase',
            _wordIndex: wi,
            _data: word,
            _text: phText,
            itemStyle: { color: '#f59e0b', borderColor: '#d97706', borderWidth: 0 },
            symbolSize: 7,
            label: {
              position: 'right',
              fontSize: 10,
              color: '#b45309',
              formatter: phText + phZh,
            },
          });
        });

        rootNode.children.push(wordNode);
      });

      return rootNode;
    }

    /* ================================================================
       ECHARTS RENDERING
       ================================================================ */
    function initChart() {
      if (chart) { chart.dispose(); chart = null; }
      if (!chartContainer || chartContainer.clientHeight === 0) return;
      chart = echarts.init(chartContainer);
      window.addEventListener('resize', () => { if (chart) chart.resize(); });
    }

    function renderMindMap(rootData, highlightWordIdx) {
      welcomeScreen.classList.add('hidden');
      chartContainer.classList.remove('hidden');

      if (!chart || chart.isDisposed()) {
        initChart();
      }
      if (!chart) return;

      const treeData = buildTreeData(rootData, highlightWordIdx);

    // Pan offsets for tree chart
    let panOffX = 0, panOffY = 0;

    function doPanChart(dx, dy) {
      panOffX += dx;
      panOffY += dy;
      applyPanToChart();
    }

    function resetPan() {
      panOffX = 0;
      panOffY = 0;
      applyPanToChart();
    }

    function applyPanToChart() {
      if (!chart || chart.isDisposed() || currentRootIndex < 0) return;
      const opt = chart.getOption();
      if (!opt || !opt.series || !opt.series[0]) return;
      const s = opt.series[0];
      const parsePct = v => parseFloat(v) || 0;
      const baseTop = parsePct(s.top), baseLeft = parsePct(s.left), baseRight = parsePct(s.right), baseBottom = parsePct(s.bottom);
      chart.setOption({
        series: [{
          top: (baseTop + panOffY) + '%',
          left: (baseLeft + panOffX) + '%',
          right: (baseRight - panOffX) + '%',
          bottom: (baseBottom - panOffY) + '%'
        }]
      });
    }

    function clearMindMap() {
      if (chart && !chart.isDisposed()) {
        chart.dispose();
        chart = null;
      }
      panOffX = 0;
      panOffY = 0;
      chartContainer.classList.add('hidden');
      welcomeScreen.classList.remove('hidden');

    async function doDictLookup(word, resultEl) {
      resultEl.classList.remove('hidden');
      resultEl.innerHTML = '<div class="flex items-center gap-2 text-blue-500 text-xs"><div class="w-3 h-3 border-2 border-blue-300 border-t-blue-500 rounded-full animate-spin"></div>查询中...</div>';

      const controller = new AbortController();
      const timeout = setTimeout(() => controller.abort(), 4000);

      // Try Free Dictionary API first, then fall back to MyMemory as proxy
      async function tryFetch(url) {
        try {
          const res = await fetch(url, { signal: controller.signal });
          if (!res.ok) throw new Error('HTTP ' + res.status);
          return await res.json();
        } catch { return null; }
      }

      const encWord = encodeURIComponent(word);
      let data = await tryFetch('https://api.dictionaryapi.dev/api/v2/entries/en/' + encWord);
      clearTimeout(timeout);

      if (data && data[0]) {
        const entry = data[0];
        let html = '<div class="flex items-center justify-between mb-2"><span class="font-bold text-blue-700 text-sm">' + escapeHTML(entry.word || word) + '</span>';
        if (entry.phonetic) html += '<span class="text-gray-400 text-xs">/' + escapeHTML(entry.phonetic) + '/</span>';
        var spkW = escapeHTML(word);
        html += '<button class="text-blue-400 hover:text-blue-600 text-xs ml-1" id="dictSpeakBtn" title="朗读">🔊</button></div>';
        // Attach speaker after render
        setTimeout(function() {
          var b = document.getElementById('dictSpeakBtn');
          if (b) b.onclick = function() { speak(spkW); };
        }, 50);

        let count = 0;
        (entry.meanings || []).forEach(function(m) {
          if (count >= 4) return;
          html += '<div class="mb-1.5"><span class="text-[11px] italic text-blue-500 font-medium">' + escapeHTML(m.partOfSpeech || '') + '</span>';
          (m.definitions || []).slice(0, 3).forEach(function(d) {
            html += '<div class="text-xs text-gray-700 ml-1">· ' + escapeHTML(d.definition) + '</div>';
            if (d.example) html += '<div class="text-[11px] text-gray-400 ml-4">"<i>' + escapeHTML(d.example) + '</i>"</div>';
          });
          html += '</div>';
          count++;
        });
        if (entry.phonetics && entry.phonetics[0] && entry.phonetics[0].audio) {
          html += '<button class="text-[10px] text-blue-400 hover:text-blue-600 mt-1" onclick="new Audio(\'' + entry.phonetics[0].audio.replace(/'/g, "\\'") + '\').play()">🔊 发音</button>';
        }
        html += '<div class="flex gap-2 mt-2"><a href="https://dictionary.cambridge.org/zhs/dictionary/english/' + encWord + '" target="_blank" class="text-[10px] text-blue-400 hover:underline">剑桥词典 →</a>';
        html += '<a href="https://m.youdao.com/dict?le=eng&q=' + encWord + '" target="_blank" class="text-[10px] text-red-400 hover:underline">有道词典 →</a>';
        html += '<button class="text-[10px] text-gray-400 hover:text-gray-600 ml-auto" onclick="this.parentElement.parentElement.classList.add(\'hidden\')">关闭</button></div>';
        resultEl.innerHTML = html;
      } else {
        // API unavailable — show direct links
        resultEl.innerHTML = '<div class="text-xs text-gray-500 mb-2">词典API不可用，使用在线词典：</div>' +
          '<div class="flex flex-wrap gap-2"><a href="https://m.youdao.com/dict?le=eng&q=' + encWord + '" target="_blank" class="text-xs px-3 py-1.5 bg-red-50 text-red-600 rounded-lg hover:bg-red-100">📖 有道词典</a>' +
          '<a href="https://dictionary.cambridge.org/zhs/dictionary/english/' + encWord + '" target="_blank" class="text-xs px-3 py-1.5 bg-blue-50 text-blue-600 rounded-lg hover:bg-blue-100">🔵 剑桥词典</a>' +
          '<a href="https://www.oxfordlearnersdictionaries.com/definition/english/' + encWord + '" target="_blank" class="text-xs px-3 py-1.5 bg-gray-50 text-gray-600 rounded-lg hover:bg-gray-100">📗 牛津</a>' +
          '<button class="text-[10px] text-gray-400 hover:text-gray-600 ml-auto" onclick="this.parentElement.parentElement.classList.add(\'hidden\')">关闭</button></div>';
      }
    }

    function renderRootList(filterText) {
      let roots = allData;
      if (filterText) {
        const q = filterText.toLowerCase();
        roots = allData.filter(r =>
          r.root.toLowerCase().includes(q) ||
          (r.root_meaning || '').toLowerCase().includes(q)
        );
      }

      if (roots.length === 0) {
        rootListInner.innerHTML = '';
        rootListEmpty.classList.remove('hidden');
        return;
      }
      rootListEmpty.classList.add('hidden');

      let html = '';
      roots.forEach((r, i) => {
        const realIndex = allData.indexOf(r);
        const wordCount = (r.words || []).length;
        const isActive = realIndex === currentRootIndex;
        html +=
          '<div class="root-item group relative px-3 py-2.5 mb-0.5 cursor-pointer rounded-r-lg border-l-[3px] ' +
          (isActive ? 'active border-l-indigo-500' : 'border-l-transparent') +
          '" data-root="' + realIndex + '">' +
          '<div class="text-sm font-medium text-gray-800">' + escapeHTML(r.root) + '</div>' +
          '<div class="flex items-center justify-between mt-0.5">' +
          '<span class="text-xs text-gray-400">' + escapeHTML(r.root_meaning || '') + '</span>' +
          '<span class="text-[10px] text-gray-300 bg-gray-100 px-1.5 py-0.5 rounded-full">' + wordCount + '词</span>' +
          '</div>' +
          '<button class="absolute right-2 top-1/2 -translate-y-1/2 w-5 h-5 rounded-full bg-gray-100 text-gray-400 hover:bg-green-100 hover:text-green-500 transition-colors flex items-center justify-center text-xs font-bold opacity-0 group-hover:opacity-100" onclick="event.stopPropagation();addWordToRootAction(' + realIndex + ')" title="新增单词">+</button>' +
          '</div>';
      });
      rootListInner.innerHTML = html;

      // Click handlers
      rootListInner.querySelectorAll('.root-item').forEach(el => {
        el.addEventListener('click', function() {
          const idx = parseInt(this.dataset.root);
          selectRoot(idx);
        });
      });

    /* ================================================================
       SEARCH
       ================================================================ */
    function doSearch(query) {
      const q = query.toLowerCase().trim();
      if (!q) {
        searchResults.classList.add('hidden');
        searchResults.innerHTML = '';
        renderRootList('');
        return;
      }

      const results = [];

      allData.forEach((root, ri) => {
        // Match root name
        if (root.root.toLowerCase().includes(q)) {
          results.push({ type: 'root', rootIndex: ri, wordIndex: -1, text: root.root, sub: root.root_meaning || '', data: root });
        }
        // Match root meaning
        if ((root.root_meaning || '').toLowerCase().includes(q) && !root.root.toLowerCase().includes(q)) {
          results.push({ type: 'root_meaning', rootIndex: ri, wordIndex: -1, text: root.root, sub: root.root_meaning || '', data: root });
        }
        // Match words and sub-items
        (root.words || []).forEach((w, wi) => {
          if (w.word.toLowerCase().includes(q)) {
            results.push({ type: 'word', rootIndex: ri, wordIndex: wi, text: w.word, sub: w.meaning || '', data: w, root: root });
          }
          if ((w.meaning || '').toLowerCase().includes(q) && !w.word.toLowerCase().includes(q)) {
            results.push({ type: 'word_cn', rootIndex: ri, wordIndex: wi, text: w.word, sub: w.meaning || '', data: w, root: root });
          }
          (w.inflections || []).forEach(inf => {
            const infWord = typeof inf === 'object' ? inf.word : inf;
            const infMeaning = typeof inf === 'object' ? (inf.meaning || '') : '';
            const pos = typeof inf === 'object' ? (inf.pos || '') : '';
            if (infWord.toLowerCase().includes(q) || infMeaning.toLowerCase().includes(q)) {
              results.push({ type: 'inflection', rootIndex: ri, wordIndex: wi, text: infWord, sub: (pos ? pos + ' ' : '') + '变形态 · ' + w.word + (infMeaning ? ' ' + infMeaning : ''), data: w, root: root });
            }
          });
          (w.synonyms || []).forEach(syn => {
            const synWord = typeof syn === 'object' ? syn.word : syn;
            const synMeaning = typeof syn === 'object' ? (syn.meaning || '') : '';
            if (synWord.toLowerCase().includes(q) || synMeaning.toLowerCase().includes(q)) {
              results.push({ type: 'synonym', rootIndex: ri, wordIndex: wi, text: synWord, sub: '近义词 · ' + w.word + (synMeaning ? ' ' + synMeaning : ''), data: w, root: root });
            }
          });
          (w.antonyms || []).forEach(ant => {
            const antWord = typeof ant === 'object' ? ant.word : ant;
            const antMeaning = typeof ant === 'object' ? (ant.meaning || '') : '';
            if (antWord.toLowerCase().includes(q) || antMeaning.toLowerCase().includes(q)) {
              results.push({ type: 'antonym', rootIndex: ri, wordIndex: wi, text: antWord, sub: '反义词 · ' + w.word + (antMeaning ? ' ' + antMeaning : ''), data: w, root: root });
            }
          });
          (w.ielts_phrases || []).forEach(ph => {
            const phEn = typeof ph === 'object' ? ph.en : ph;
            const phZh = typeof ph === 'object' ? (ph.zh || '') : '';
            if (phEn.toLowerCase().includes(q) || phZh.toLowerCase().includes(q)) {
              results.push({ type: 'phrase', rootIndex: ri, wordIndex: wi, text: phEn, sub: '词组 · ' + w.word + (phZh ? ' ' + phZh : ''), data: w, root: root });
            }
          });
          (w.ielts_sentences || []).forEach(sen => {
            const senEn = typeof sen === 'object' ? sen.en : sen;
            const senZh = typeof sen === 'object' ? (sen.zh || '') : '';
            if (senEn.toLowerCase().includes(q) || senZh.toLowerCase().includes(q)) {
              results.push({ type: 'sentence', rootIndex: ri, wordIndex: wi, text: senEn.substring(0, 60) + (senEn.length > 60 ? '...' : ''), sub: '例句 · ' + w.word + (senZh ? ' ' + senZh.substring(0, 40) : ''), data: w, root: root });
            }
          });
        });
      });

      // Deduplicate by root+word+type
      const seen = new Set();
      const unique = results.filter(r => {
        const key = r.type + '|' + r.rootIndex + '|' + r.wordIndex + '|' + r.text;
        if (seen.has(key)) return false;
        seen.add(key);
        return true;
      });

      // Limit results
      const limited = unique.slice(0, 25);

      if (limited.length === 0) {
        searchResults.innerHTML = '<div class="px-4 py-3 text-sm text-gray-400 text-center">无匹配结果</div>';
      } else {
        const typeLabels = { root: '词根', root_meaning: '词根释义', word: '单词', word_cn: '单词释义', inflection: '变形态', synonym: '近义词', antonym: '反义词', phrase: '词组', sentence: '例句' };
        const typeColors = { root: 'bg-indigo-50 text-indigo-600', root_meaning: 'bg-indigo-50 text-indigo-400', word: 'bg-cyan-50 text-cyan-600', word_cn: 'bg-cyan-50 text-cyan-400', inflection: 'bg-emerald-50 text-emerald-600', synonym: 'bg-violet-50 text-violet-600', antonym: 'bg-red-50 text-red-600', phrase: 'bg-amber-50 text-amber-600', sentence: 'bg-blue-50 text-blue-600' };
        searchResults.innerHTML = limited.map((r, i) =>
          '<div class="search-result-item flex items-center gap-3 px-4 py-2.5 hover:bg-gray-50 cursor-pointer border-b border-gray-50 last:border-0 transition-colors" data-idx="' + i + '">' +
          '<span class="text-[10px] px-1.5 py-0.5 rounded-full font-medium flex-shrink-0 ' + (typeColors[r.type] || 'bg-gray-50 text-gray-500') + '">' + (typeLabels[r.type] || r.type) + '</span>' +
          '<div class="flex-1 min-w-0">' +
          '<div class="text-sm font-medium text-gray-700 truncate">' + escapeHTML(r.text) + '</div>' +
          '<div class="text-xs text-gray-400 truncate">' + escapeHTML(r.sub) + '</div>' +
          '</div></div>'
        ).join('');

        // Click handlers
        searchResults.querySelectorAll('.search-result-item').forEach(el => {
          el.addEventListener('click', function() {
            const r = limited[parseInt(this.dataset.idx)];
            navigateToSearchResult(r);
          });
        });
      }

      searchResults.classList.remove('hidden');
    }

    function navigateToSearchResult(r) {
      searchResults.classList.add('hidden');
      searchResults.innerHTML = '';
      searchInput.value = '';

      if (r.rootIndex !== currentRootIndex) {
        currentRootIndex = r.rootIndex;
        currentWordIndex = r.wordIndex;
        hideDetailPanelSilent();
        renderRootList('');
        renderMindMap(allData[r.rootIndex], r.wordIndex);
        if (r.wordIndex >= 0 && r.data) {
          setTimeout(() => showDetailPanel(r.data), 100);
        }
      } else {
        // Same root, just select word
        if (r.wordIndex >= 0 && r.data) {
          selectWord(r.wordIndex, r.data);
        }
      }

      // Scroll to root in list
      const rootEl = rootListInner.querySelector('[data-root="' + r.rootIndex + '"]');
      if (rootEl) rootEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }

    /* ================================================================
       DICTATION
       ================================================================ */
    function openDictation() {
      dictOverlay.classList.remove('hidden');
      dictActiveArea.classList.add('hidden');
      dictSummary.classList.add('hidden');
      dictStartBtn.classList.remove('hidden');
      dictWordList.innerHTML = '';
      $('dictMode').value = dictMode;
    }

    function closeDictation() {
      dictOverlay.classList.add('hidden');
      stopAllSpeech();
    }

    function startDictation() {
      dictMode = $('dictMode').value;
      const count = parseInt($('dictCount').value);
      $('dictTypeLabel').textContent = dictMode === 'word' ? '单词' : '词组';

      // Build item pool
      const pool = [];
      allData.forEach(root => {
        root.words.forEach(w => {
          if (dictMode === 'word') {
            pool.push({ type: 'word', text: w.word, meaning: w.meaning, answer: w.word });
          } else {
            (w.ielts_phrases || []).forEach(ph => {
              const en = getPhEn(ph);
              if (en) pool.push({ type: 'phrase', text: en, meaning: getPhZh(ph), answer: en });
            });
          }
        });
      });

      if (pool.length === 0) {
        alert('没有可供默写的内容，请先导入数据。');
        return;
      }

      // Shuffle and pick
      dictItems = pool.sort(() => Math.random() - 0.5).slice(0, Math.min(count, pool.length));
      dictIndex = 0;
      dictScore = 0;
      dictAnswered = false;

      dictActiveArea.classList.remove('hidden');
      dictStartBtn.classList.add('hidden');
      dictSummary.classList.add('hidden');
      $('dictScore').textContent = '0';

      renderDictWordList();
      showDictItem();
    }

    function renderDictWordList() {
      dictWordList.innerHTML = dictItems.map((item, i) => {
        let cls = 'text-xs text-gray-400';
        let icon = '<span class="w-5 text-center text-[10px] text-gray-300">' + (i + 1) + '</span>';
        let label;
        if (item.correct === true) {
          cls = 'text-xs text-green-600 font-medium';
          icon = '<span class="w-5 text-center">✓</span>';
          label = item.text;
        } else if (item.correct === false) {
          cls = 'text-xs text-red-500 font-medium';
          icon = '<span class="w-5 text-center">✗</span>';
          label = item.text + ' → ' + item.answer;
        } else if (i === dictIndex && !dictAnswered) {
          cls = 'text-xs text-indigo-500 font-medium';
          icon = '<span class="w-5 text-center">▶</span>';
          label = '???';
        } else {
          label = '???';
        }
        if (label.length > 40) label = label.substring(0, 40) + '...';
        return '<div class="flex items-center gap-2 ' + cls + '">' + icon + '<span>' + escapeHTML(label) + '</span></div>';
      }).join('');
    }

    function showDictItem() {
      if (dictIndex >= dictItems.length) {
        showDictSummary();
        return;
      }
      const item = dictItems[dictIndex];
      dictAnswered = false;
      dictInput.value = '';
      dictInput.disabled = false;
      dictInput.focus();
      dictInput.placeholder = '输入你听到的内容...';
      dictFeedback.classList.add('hidden');
      dictNextBtn.classList.add('hidden');
      dictCheckBtn.classList.remove('hidden');
      dictSummary.classList.add('hidden');
      dictActiveArea.classList.remove('hidden');
      $('dictProgress').textContent = (dictIndex + 1) + '/' + dictItems.length;
      renderDictWordList();

      // Auto-speak
      dictSpeak();
    }

    function dictSpeak() {
      stopAllSpeech();
      const item = dictItems[dictIndex];
      if (!item) return;
      const text = getSpeakableText(item.text);
      if (!text) return;
      const speed = parseFloat(dictSpeedSlider.value) || 0.8;
      const replayCount = parseInt(dictReplayCount.value) || 1;
      function speakOne(remaining) {
        if (remaining <= 0) return;
        const u = new SpeechSynthesisUtterance(text);
        u.lang = accent;
        u.rate = speed;
        u.pitch = 1.0;
        const voices = window.speechSynthesis.getVoices();
        if (voices.length > 0) {
          const preferred = voices.find(v => v.lang.startsWith('en-US') && (v.name.includes('Natural') || v.name.includes('Online'))) ||
                            voices.find(v => v.lang.startsWith('en-US') && v.name.includes('Microsoft')) ||
                            voices.find(v => v.lang.startsWith('en-US'));
          if (preferred) u.voice = preferred;
        }
        u.onend = () => speakOne(remaining - 1);
        window.speechSynthesis.speak(u);
      }
      speakOne(replayCount);
    }

    function checkDictAnswer() {
      if (dictAnswered || dictIndex >= dictItems.length) return;
      dictAnswered = true;

      const item = dictItems[dictIndex];
      const userAnswer = dictInput.value.trim();
      const correctAnswer = item.answer.trim();

      // Normalize comparison: case-insensitive, trim punctuation
      const normalize = s => s.toLowerCase().replace(/[.,!?;:'"]/g, '').replace(/\s+/g, ' ').trim();
      const isCorrect = normalize(userAnswer) === normalize(correctAnswer);

      // Store per-item correctness
      item.correct = isCorrect;
      item.userAnswer = userAnswer;

      dictInput.disabled = true;
      dictCheckBtn.classList.add('hidden');
      dictFeedback.classList.remove('hidden');
      dictNextBtn.classList.remove('hidden');
      dictNextBtn.focus();

      if (isCorrect) {
        dictScore++;
        dictFeedbackIcon.textContent = '✅';
        dictFeedbackText.textContent = '正确！';
        dictFeedbackText.className = 'text-sm font-medium text-green-600';
        dictCorrectAns.textContent = correctAnswer + (item.meaning ? ' (' + item.meaning + ')' : '');
        $('dictScore').textContent = dictScore;
      } else {
        dictFeedbackIcon.textContent = '❌';
        dictFeedbackText.textContent = '有误，正确答案是：';
        dictFeedbackText.className = 'text-sm font-medium text-red-500';
        dictCorrectAns.textContent = correctAnswer + (item.meaning ? ' (' + item.meaning + ')' : '');
      }

      // Update word list
      renderDictWordList();
    }

    function showDictSummary() {
      dictActiveArea.classList.add('hidden');
      dictSummary.classList.remove('hidden');
      $('dictFinalScore').textContent = dictScore + ' / ' + dictItems.length;
      $('dictCorrectCount').textContent = dictScore;
      $('dictTotalCount').textContent = dictItems.length;
      $('dictProgress').textContent = dictItems.length + '/' + dictItems.length;

      // Show full answer list with EN+ZH
      let answerHtml = '<div class="mt-3 space-y-1.5 text-left max-h-64 overflow-y-auto">';
      dictItems.forEach((item, i) => {
        const correct = item.correct === true;
        const icon = correct ? '✓' : '✗';
        const iconCls = correct ? 'text-green-500' : 'text-red-500';
        const rowCls = correct ? 'bg-green-50 border-green-200' : 'bg-red-50 border-red-200';
        answerHtml += '<div class="flex items-start gap-2 p-2 rounded-lg border ' + rowCls + ' text-xs">';
        answerHtml += '<span class="' + iconCls + ' font-bold mt-0.5">' + icon + '</span>';
        answerHtml += '<div class="flex-1 min-w-0">';
        answerHtml += '<span class="font-medium text-gray-800">' + escapeHTML(item.answer) + '</span>';
        if (item.meaning) answerHtml += '<span class="text-gray-400 ml-1">' + escapeHTML(item.meaning) + '</span>';
        if (!correct && item.userAnswer) {
          answerHtml += '<div class="text-red-500 mt-0.5">你的答案: ' + escapeHTML(item.userAnswer) + '</div>';
        }
        answerHtml += '</div></div>';
      });
      answerHtml += '</div>';

      // Insert answer list before the buttons
      const summaryDiv = dictSummary;
      // Remove existing answer list if any
      const existing = summaryDiv.querySelector('.dict-answer-list');
      if (existing) existing.remove();
      const btnDiv = summaryDiv.querySelector('.flex.gap-2.justify-center');
      if (btnDiv) {
        const wrapper = document.createElement('div');
        wrapper.className = 'dict-answer-list';
        wrapper.innerHTML = answerHtml;
        btnDiv.parentNode.insertBefore(wrapper, btnDiv);
      }
    }

    function parsePastedText() {
      const raw = pasteInput.value.trim();
      if (!raw) { pastePreview.innerHTML = '<p class="text-xs text-red-400 text-center py-4">请先粘贴文本</p>'; return; }

      const lines = raw.split(/[\n\r]+/).filter(l => l.trim());
      const parsed = [];
      // Multiple regex patterns for common formats
      const patterns = [
        // word — pos. meaning   OR   word — meaning
        /^(\S+)\s*[—\-]\s*(?:([a-z]+\.)\s*)?(.+)$/i,
        // word (pos) meaning
        /^(\S+)\s*\(([a-z.]+)\)\s*(.+)$/i,
        // word pos. meaning
        /^(\S+)\s+([a-z]+\.[\sa-z]*?)\s+(.+)$/i,
        // word meaning (simple)
        /^(\S+)\s+(.+)$/
      ];

      lines.forEach(line => {
        line = line.trim().replace(/[　]/g, ' '); // full-width spaces
        let matched = false;
        for (const pat of patterns) {
          const m = line.match(pat);
          if (m) {
            const word = m[1];
            let pos = m[2] ? m[2].replace(/\s+/g, ' ').trim() : '';
            let meaning = m[3] || m[2] || '';
            // If pattern 4 matched with just word+text
            if (!meaning && m[2]) meaning = m[2];
            // Clean pos: ensure it looks like a POS
            if (pos && !/^[a-z]+\.[a-z.\s]*$/i.test(pos.replace(/\s/g,''))) {
              // pos might actually be part of meaning
              meaning = pos + ' ' + meaning;
              pos = '';
            }
            parsed.push({ word, pos: pos || '', meaning: meaning.trim() });
            matched = true;
            break;
          }
        }
        if (!matched && line.trim()) {
          parsed.push({ word: line.trim().split(/\s+/)[0], pos: '', meaning: line.trim().replace(/^\S+\s*/, '') });
        }
      });

      if (parsed.length === 0) {
        pastePreview.innerHTML = '<p class="text-xs text-amber-500 text-center py-4">未能解析到单词，请检查格式</p>';
        return;
      }

      let html = '<div class="text-xs text-gray-500 mb-2">解析到 <b>' + parsed.length + '</b> 个单词</div>';
      html += '<div class="space-y-1">';
      parsed.forEach((p, i) => {
        html += '<div class="flex items-center gap-2 bg-gray-50 rounded-lg p-2 text-[11px]">';
        html += '<span class="font-bold text-gray-800 min-w-[90px]">' + escapeHTML(p.word) + '</span>';
        if (p.pos) html += '<span class="text-indigo-500 min-w-[50px]">' + escapeHTML(p.pos) + '</span>';
        html += '<span class="text-gray-500 flex-1 truncate">' + escapeHTML(p.meaning) + '</span>';
        html += '</div>';
      });
      html += '</div>';
      html += '<button onclick="importParsedWords(' + JSON.stringify(JSON.stringify(parsed)) + ')" class="mt-3 w-full py-1.5 rounded-lg text-xs font-medium bg-green-500 text-white hover:bg-green-600 transition-colors">✅ 导入全部单词</button>';

      pastePreview.innerHTML = html;
    }

    window.importParsedWords = function(parsedJson) {
      const rootIdx = parseInt(pasteRootSelect.value);
      if (isNaN(rootIdx) || rootIdx < 0 || rootIdx >= allData.length) {
        alert('请先选择目标词根');
        return;
      }
      const parsed = JSON.parse(parsedJson);
      if (!parsed || parsed.length === 0) return;
      const root = allData[rootIdx];
      let added = 0;
      parsed.forEach(p => {
        const exists = root.words.some(w => w.word.toLowerCase() === p.word.toLowerCase());
        if (!exists) {
          root.words.push({
            word: p.word,
            phonetic: '',
            meaning: (p.pos ? p.pos + ' ' : '') + p.meaning,
            inflections: [],
            synonyms: [],
            antonyms: [],
            ielts_phrases: [],
            ielts_sentences: [],
            etymology: '',
            mnemonic: ''
          });
          added++;
        }
      });
      saveDataToStorage();
      pasteOverlay.classList.add('hidden');
      renderRootList(searchInput.value.trim());
      if (currentRootIndex === rootIdx) renderMindMap(allData[rootIdx], -1);
      alert('成功导入 ' + added + ' 个单词到词根 "' + root.root + '"（跳过 ' + (parsed.length - added) + ' 个重复）');
    };

    /* ================================================================

       ================================================================ */
    function loadFavorites() {
      try {
        const saved = localStorage.getItem('ielts_favorites');
        if (saved) {
          const obj = JSON.parse(saved);
          if (Array.isArray(obj)) {
            // Migrate old format
            favorites = { words: new Set(obj), items: {} };
          } else {
            favorites = { words: new Set(obj.words || []), items: obj.items || {} };
          }
        }
      } catch (e) { favorites = { words: new Set(), items: {} }; }
      window._favs = favorites;
      updateFavCount();
    }

    function saveFavorites() {
      try {
        localStorage.setItem('ielts_favorites', JSON.stringify({
          words: [...favorites.words],
          items: favorites.items
        }));
      } catch (e) { /* ignore */ }
    }

    function toggleFavorite() {
      if (currentRootIndex < 0 || currentWordIndex < 0) return;
      const w = allData[currentRootIndex].words[currentWordIndex];
      if (!w) return;

      if (favorites.words.has(w.word)) {
        favorites.words.delete(w.word);
      } else {
        favorites.words.add(w.word);
      }
      saveFavorites();
      updateFavStar();
      updateFavCount();
      if (showFavoritesOnly) renderRootList(searchInput.value.trim());
    }

    function toggleItemFavorite(parentWord, type, value, pos, meaning) {
      const key = parentWord + '|' + type + '|' + value;
      if (favorites.items[key]) {
        delete favorites.items[key];
      } else {
        // Find root info for parent
        let rootName = '', rootMeaning = '';
        for (const r of allData) {
          if (r.words.some(w => w.word === parentWord)) {
            rootName = r.root;
            rootMeaning = r.root_meaning || '';
            break;
          }
        }
        favorites.items[key] = { type, value, pos, meaning, parentWord, root: rootName, rootMeaning };
      }
      saveFavorites();
      updateFavCount();
      if (currentRootIndex >= 0 && currentWordIndex >= 0) {
        showDetailPanel(allData[currentRootIndex].words[currentWordIndex]);
      }
      if (showFavoritesOnly) renderRootList(searchInput.value.trim());
    }

    function isItemFavorited(parentWord, type, value) {
      const key = parentWord + '|' + type + '|' + value;
      return !!favorites.items[key];
    }

    function updateFavStar() {
      if (currentRootIndex < 0 || currentWordIndex < 0) return;
      const w = allData[currentRootIndex].words[currentWordIndex];
      if (!w) return;

      if (favorites.words.has(w.word)) {
        favStarIcon.setAttribute('fill', '#f59e0b');
        favStarIcon.setAttribute('stroke', '#f59e0b');
        favoriteBtn.classList.add('text-amber-400');
        favoriteBtn.classList.remove('text-gray-400');
      } else {
        favStarIcon.setAttribute('fill', 'none');
        favStarIcon.setAttribute('stroke', 'currentColor');
        favoriteBtn.classList.remove('text-amber-400');
        favoriteBtn.classList.add('text-gray-400');
      }
    }

    function updateFavCount() {
      const itemCount = Object.keys(favorites.items).length;
      $('favCount').textContent = favorites.words.size + itemCount;
      if (showFavoritesOnly) {
        favFilterIcon.textContent = '🔍';
        favFilterBtn.classList.add('bg-amber-100');
      } else {
        favFilterIcon.textContent = '⭐';
        favFilterBtn.classList.remove('bg-amber-100');
      }
    }

    function toggleFavFilter() {
      showFavoritesOnly = !showFavoritesOnly;
      updateFavCount();
      renderRootList(searchInput.value.trim());
      if (showFavoritesOnly && currentRootIndex >= 0) {
        const w = allData[currentRootIndex].words[currentWordIndex];
        if (w && !favorites.words.has(w.word)) {
          hideDetailPanel();
        }
      }
    }

    // Override renderRootList to support favorites filter
    const originalRenderRootList = renderRootList;
    renderRootList = function(filterText) {
      let roots = allData;
      if (filterText) {
        const q = filterText.toLowerCase();
        roots = allData.filter(r =>
          r.root.toLowerCase().includes(q) ||
          (r.root_meaning || '').toLowerCase().includes(q) ||
          r.words.some(w => w.word.toLowerCase().includes(q) || w.meaning.toLowerCase().includes(q))
        );
      }

      // Filter by favorites
      if (showFavoritesOnly) {
        roots = roots.map(r => ({
          ...r,
          words: r.words.filter(w => favorites.words.has(w.word))
        })).filter(r => r.words.length > 0);

        // Build favorited items section grouped by parent word → POS
        const itemMap = {}; // { parentWord: { root, rootMeaning, posGroups: { pos: [items] } } }
        Object.values(favorites.items).forEach(item => {
          const pw = item.parentWord;
          if (!itemMap[pw]) {
            let rootName = item.root || '', rootMeaning = item.rootMeaning || '';
            // Find root info for parent word if not stored
            if (!rootName) {
              for (const r of allData) {
                if (r.words.some(w => w.word === pw)) {
                  rootName = r.root;
                  rootMeaning = r.root_meaning || '';
                  break;
                }
              }
            }
            itemMap[pw] = { root: rootName, rootMeaning, posGroups: {} };
          }
          const pos = item.pos || '其它';
          if (!itemMap[pw].posGroups[pos]) itemMap[pw].posGroups[pos] = [];
          itemMap[pw].posGroups[pos].push(item);
        });

        // If no words and no items, show empty
        if (roots.length === 0 && Object.keys(itemMap).length === 0) {
          rootListInner.innerHTML = '';
          rootListEmpty.classList.remove('hidden');
          rootListEmpty.querySelector('p').textContent = '收藏夹为空，去收藏一些单词吧 ⭐';
          return;
        }
        rootListEmpty.classList.add('hidden');

        // Render regular roots + grouped items
        let html = '';

        // Regular root entries
        roots.forEach((r) => {
          const realIndex = allData.indexOf(allData.find(ar => ar.root === r.root));
          const wordCount = (r.words || []).length;
          const isActive = realIndex === currentRootIndex;
          html +=
            '<div class="root-item group relative px-3 py-2.5 mb-0.5 cursor-pointer rounded-r-lg border-l-[3px] ' +
            (isActive ? 'active border-l-indigo-500' : 'border-l-transparent') +
            '" data-root="' + realIndex + '">' +
            '<div class="text-sm font-medium text-gray-800">' + escapeHTML(r.root) + '</div>' +
            '<div class="flex items-center justify-between mt-0.5">' +
            '<span class="text-xs text-gray-400">' + escapeHTML(r.root_meaning || '') + '</span>' +
            '<span class="text-[10px] text-gray-300 bg-gray-100 px-1.5 py-0.5 rounded-full">' + wordCount + '词</span>' +
            '</div></div>';
        });

        // Favorited items section header
        if (Object.keys(itemMap).length > 0) {
          html += '<div class="px-3 py-2 mt-2 text-[10px] font-semibold text-amber-500 uppercase tracking-wider border-t border-amber-100">已收藏的词条</div>';
        }

        // Render grouped items
        const typeLabel = { inflection: '变形', synonym: '近义', antonym: '反义', phrase: '词组' };
        const typeColor = { inflection: 'text-gray-600 bg-gray-100', synonym: 'text-violet-600 bg-violet-50', antonym: 'text-red-600 bg-red-50', phrase: 'text-amber-600 bg-amber-50' };
        Object.entries(itemMap).forEach(([parentWord, group]) => {
          html += '<div class="px-3 py-2 mb-1 bg-amber-50/50 rounded-lg mx-1">';
          html += '<div class="text-xs font-medium text-gray-700">' + escapeHTML(parentWord);
          if (group.root) html += ' <span class="text-[10px] text-gray-400">(' + escapeHTML(group.root) + ')</span>';
          html += '</div>';
          // Group by POS
          Object.entries(group.posGroups).forEach(([pos, items]) => {
            html += '<div class="mt-1 ml-2 text-[11px] text-gray-500">' + (pos ? escapeHTML(pos) + ' · ' : '');
            html += items.map(it => {
              const lbl = typeLabel[it.type] || it.type;
              const cl = typeColor[it.type] || 'text-gray-500';
              return '<span class="inline-block px-1 py-0.5 rounded ' + cl + ' text-[10px] mr-1 mb-1">' + lbl + ': ' + escapeHTML(it.value) + (it.meaning ? ' ' + escapeHTML(it.meaning) : '') + '</span>';
            }).join('');
            html += '</div>';
          });
          // Remove button for all items under this parent word
          html += '<button class="text-[10px] text-gray-400 hover:text-red-400 mt-1" onclick="event.stopPropagation();';
          // Build list of keys to delete
          let delKeys = [];
          Object.values(group.posGroups).forEach(arr => arr.forEach(it => {
            delKeys.push(parentWord + '|' + it.type + '|' + it.value);
          }));
          html += 'var ks=' + JSON.stringify(delKeys) + ';ks.forEach(function(k){delete window._favs.items[k];});';
          html += 'window._saveFavs();window._updateFavs();">移除此项</button>';
          html += '</div>';
        });

        rootListInner.innerHTML = html;
        // Only attach click handlers for regular root items
        rootListInner.querySelectorAll('.root-item').forEach(el => {
          el.addEventListener('click', function() {
            const idx = parseInt(this.dataset.root);
            selectRoot(idx);
          });
        });
        return;
      }

      // Non-favorites view (normal)
      if (roots.length === 0) {
        rootListInner.innerHTML = '';
        rootListEmpty.classList.remove('hidden');
        rootListEmpty.querySelector('p').textContent = '未找到匹配的词根';
        return;
      }
      rootListEmpty.classList.add('hidden');

      let html = '';
      roots.forEach((r) => {
        const realIndex = allData.indexOf(allData.find(ar => ar.root === r.root));
        const wordCount = (r.words || []).length;
        const isActive = realIndex === currentRootIndex;
        html +=
          '<div class="root-item group relative px-3 py-2.5 mb-0.5 cursor-pointer rounded-r-lg border-l-[3px] ' +
          (isActive ? 'active border-l-indigo-500' : 'border-l-transparent') +
          '" data-root="' + realIndex + '">' +
          '<div class="text-sm font-medium text-gray-800">' + escapeHTML(r.root) + '</div>' +
          '<div class="flex items-center justify-between mt-0.5">' +
          '<span class="text-xs text-gray-400">' + escapeHTML(r.root_meaning || '') + '</span>' +
          '<span class="text-[10px] text-gray-300 bg-gray-100 px-1.5 py-0.5 rounded-full">' + wordCount + '词</span>' +
          '</div>' +
          '<button class="absolute right-2 top-1/2 -translate-y-1/2 w-5 h-5 rounded-full bg-gray-100 text-gray-400 hover:bg-green-100 hover:text-green-500 transition-colors flex items-center justify-center text-xs font-bold opacity-0 group-hover:opacity-100" onclick="event.stopPropagation();addWordToRootAction(' + realIndex + ')" title="新增单词">+</button>' +
          '</div>';
      });
      rootListInner.innerHTML = html;

      rootListInner.querySelectorAll('.root-item').forEach(el => {
        el.addEventListener('click', function() {
          const idx = parseInt(this.dataset.root);
          selectRoot(idx);
        });
      });
    };
